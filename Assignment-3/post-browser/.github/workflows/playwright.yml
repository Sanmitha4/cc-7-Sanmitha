name: Playwright Tests
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    # Set the default working directory for all steps in this job
    defaults:
      run:
        working-directory: Assignment-3/post-browser

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      working-directory: Assignment-3/post-browser
      run: npm install

    - name: Install Playwright Browsers & System Deps
      working-directory: Assignment-3/post-browser
      # The '--with-deps' flag is key, but sometimes a separate 
      # install-deps command is more reliable in complex environments
      run: |
        npx playwright install --with-deps
        sudo npx playwright install-deps

    - name: Run Playwright tests
      working-directory: Assignment-3/post-browser
      run: npx playwright test