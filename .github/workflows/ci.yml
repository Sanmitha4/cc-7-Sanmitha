name: Project Checkup

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  quality-control:
    runs-on: ubuntu-latest

    steps:
      - name: Copy Code to VM
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm install

      - name: Run ESLint (Linting)
        # Simplified: removed version lock and --ext flag
        run: npx eslint .

      - name: Run Vitest (Testing)
        run: npx vitest run