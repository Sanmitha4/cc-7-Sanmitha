name: Project Checkup

# 1. When should this run?
on:
  push:
    branches:
      - '**'
  pull_request:
    branches: 
      - '**'

# 2. What should it do?
jobs:
  quality-control:
    runs-on: ubuntu-latest # Uses a fresh Linux VM

    steps:
      - name: Copy Code to VM
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run ESLint (Linting)
        run: npx eslint .

      - name: Run Vitest (Testing)
        run: npx vitest run